name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Update version files
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # Remove 'v' prefix if present for file content
          FILE_VERSION=${VERSION#v}
          echo "Updating to version: $FILE_VERSION"
          # Update marketplace.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$FILE_VERSION\"/" .claude-plugin/marketplace.json
          # Update plugin.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$FILE_VERSION\"/" .claude-plugin/plugin.json
          # Update SKILL.md
          sed -i "s/version: \"[^\"]*\"/version: \"$FILE_VERSION\"/" skills/open-notebook/SKILL.md

          # Show changes
          git diff --stat

      - name: Commit and push
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # Remove 'v' prefix if present
          FILE_VERSION=${VERSION#v}
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update skill version to $FILE_VERSION"
            git push
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false