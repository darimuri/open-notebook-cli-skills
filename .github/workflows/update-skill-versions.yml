name: Update Skill Versions

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.0.3)'
        required: true

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Update version files
        env:
          VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
        run: |
          # Remove 'v' prefix if present
          VERSION=${VERSION#v}
          echo "Updating to version: $VERSION"
          # Update marketplace.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" .claude-plugin/marketplace.json
          # Update SKILL.md
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" skills/open-notebook/SKILL.md

          # Show changes
          git diff --stat

      - name: Commit and push
        env:
          VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
        run: |
          # Remove 'v' prefix if present
          VERSION=${VERSION#v}
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Update skill version to $VERSION"
          git push
